      #innhold{
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-gap: 10px;
        text-align: center;
      }
      #innhold div{
        background-color: lightblue;
        padding: 25px;
      }
      #innhold div:nth-child(2n-1){
        background-color: lightgreen;
      }

    .fire{
      display: grid;
      grid-template-columns: repeat(2,1fr);
      text-align: center;
      grid-gap: 10px

    }
    .fire p{
      border: solid 5px black;
      padding: 5px;
      margin-top: 0px;

    }
    body{max-width: 960px; margin: auto; margin-top: 10px}

    </style>
  </head>
  <body>

    <div id="innhold">
      <div class="en">1</div>
      <div class="to">2</div>
      <div class="tre">3
      </div>
      <div class="fire">
              <p>1</p>
              <p>2</p>
              <p>3</p>
              <p>4</p>
            </div>
      <div class="fem">5</div>
      <div class="seks">6</div>
      <div class="sju">7</div>
      <div class="åtte">8</div>
      <div class="ni">9</div>

    </div>
